name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: clojure -M:test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache m2 / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-jdk${{ matrix.java }}-clj-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jdk${{ matrix.java }}-clj-

      - name: Run tests
        run: clojure -M:test

      - run: clojure -M:lint
      - name: Compile bounded Kotoba validator
        run: |
          mkdir -p target/kotoba
          clojure -M:kotoba compile test/ddl/bounded_conformance.kotoba \
            --source-path src --target js-browser --output target/kotoba/ddl.mjs
          clojure -M:kotoba compile test/ddl/bounded_conformance.kotoba \
            --source-path src --target wasm32-browser --output target/kotoba/ddl.wasm
      - name: Execute bounded Web and Wasm conformance
        run: |
          compiler_src="$(clojure -Spath -M:kotoba | tr ':' '\n' | grep '/compiler/' | head -1)"
          node scripts/verify-kotoba-bounded.mjs target/kotoba/ddl.mjs \
            target/kotoba/ddl.wasm "$(dirname "$compiler_src")/runtime/browser-host.mjs"
